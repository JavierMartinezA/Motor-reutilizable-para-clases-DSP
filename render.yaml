services:
  - type: web
    name: dsp-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: dsp-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    # SPA fallback: cualquier ruta sin archivo físico (ej. /mir, /fm) se
    # reescribe a index.html para que App.jsx resuelva el deck por pathname.
    # Render NO aplica esta regla a rutas con recurso real (JS/CSS/audio).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: dsp-backend
          envVarKey: RENDER_EXTERNAL_URL
